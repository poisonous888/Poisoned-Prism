name: Upload Release Asset

on:
  release:
    types: [created]

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for allowing the action to upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # (Optional) Add steps here to build your file if needed
      # Example: run: npm run build or run: gcc main.c -o my-app

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            path/to/your/file.txt
            path/to/another/artifact.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}