name: build zip
on: [ pull_request, push ]

env:
  NAME: poisoned-prism
  VERSION: 0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: cull unused files
        run: |
          rm -r .git/ ".github/" .gitignore README.md
          find assets -name index*.txt -delete

      - name: create full zip
        run: |
          zip -r ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/*" -x "assets/minecraft/optifine/sky/*"

      - name: capture full zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip
          archive: false

      - name: create CIT zip
        run: |
          zip -r ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/psnprsm/*" "assets/hypixel_skyblock/*" assets/minecraft/items/* assets/minecraft/models/item/*

      - name: capture CIT zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip
          archive: false

      - name: create EQUIPMENT zip
        run: |
          zip -r ${{ env.NAME }}-EQUIPMENT-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/psnprsm/*" "assets/hypixel_skyblock/*" assets/minecraft/items/* assets/minecraft/models/item/* assets/minecraft/textures/item/* assets/minecraft/textures/misc/* assets/minecraft/textures/entity/projectiles/* assets/minecraft/textures/entity/equipment/*

      - name: capture EQUIPMENT zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-EQUIPMENT-${{ env.VERSION }}.zip
          archive: false