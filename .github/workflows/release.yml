name: build zip
on: [ pull_request, push ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - name: checkout repository
        uses: actions/checkout@v3
      
      - name: create zip
        run: |
          zip -r MY-CUSTOM-NAME.zip .
      
      - name: capture zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            MY-CUSTOM-NAME.zip
          archive: false