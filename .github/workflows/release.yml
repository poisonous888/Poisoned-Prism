name: build zip
on: [ pull_request, push ]

env:
  NAME: poisoned-prism
  VERSION: 0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: cull unused files
        run: |
          rm -r .git/ ".github/" .gitignore README.md "assets/minecraft/textures/todo and concept"
          find assets -name index*.txt -delete

      - name: create full zip
        run: |
          zip -r ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/*" -x "assets/minecraft/optifine/sky/*"

      - name: capture full zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip
          archive: false

      - name: create CIT zip
        run: |
          zip -r ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/psnprsm/*" "assets/hypixel_skyblock/*" assets/minecraft/items/* assets/minecraft/models/item/*

      - name: capture CIT zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip
          archive: false

      - name: create EQUIPMENT zip
        run: |
          zip -r ${{ env.NAME }}-EQUIPMENT-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta "assets/psnprsm/*" "assets/hypixel_skyblock/*" assets/minecraft/items/* assets/minecraft/models/item/* assets/minecraft/textures/item/* assets/minecraft/textures/misc/* assets/minecraft/textures/font/* assets/minecraft/textures/particle/* assets/minecraft/textures/entity/projectiles/* "assets/minecraft/textures/entity/equipment/*" assets/minecraft/textures/entity/fishing/* assets/minecraft/textures/entity/experience/* assets/minecraft/textures/entity/creeper/creeper_armor.png

      - name: capture EQUIPMENT zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-EQUIPMENT-${{ env.VERSION }}.zip
          archive: false

      - name: create WORLD zip
        run: |
          zip -r ${{ env.NAME }}-WORLD-${{ env.VERSION }}.zip . -i pack.png pack.mcmeta assets/minecraft/lang/* assets/minecraft/optifine/ctm/* assets/minecraft/shaders/* assets/minecraft/models/block/* assets/minecraft/textures/block/* assets/minecraft/textures/environment/* assets/minecraft/textures/entity/* -x assets/minecraft/textures/entity/projectiles/* "assets/minecraft/textures/entity/equipment/*" assets/minecraft/textures/entity/player/* assets/minecraft/textures/entity/fishing/* assets/minecraft/textures/entity/experience/*

      - name: capture WORLD zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-WORLD-${{ env.VERSION }}.zip
          archive: false