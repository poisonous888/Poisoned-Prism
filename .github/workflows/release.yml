name: build zip
on: [ pull_request, push ]

env:
  NAME: poisoned-prism
  VERSION: 0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3
      
      - name: create full zip
        run: |
          zip -r ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip . -x ".git/*" ".github/*" .gitignore README.md

      - name: capture full zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip
          archive: false

      - name: create CIT zip
        run: |
          zip -r ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip . -x ".git/*" ".github/*" .gitignore README.md assets/appleskin/* assets/minecraft.*

      - name: capture equipment zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip
          archive: false
