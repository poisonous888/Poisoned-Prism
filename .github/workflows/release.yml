name: build zip
on: [ pull_request, push ]

env:
  NAME: poisoned-prism
  TYPE: FULL
  VERSION: 0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3
      
      - name: create zip
        run: |
          zip -r ${{ env.NAME }}-${{ env.TYPE }}-${{ env.VERSION }}.zip . -x ".git/*" ".github/*" .gitignore README.md
      
      - name: capture zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-${{ env.TYPE }}-${{ env.VERSION }}.zip
          archive: false