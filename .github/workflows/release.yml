name: build zip
on: [ pull_request, push ]

env:
  NAME: poisoned-prism
  VERSION: 0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: cull unused files
        run: |
          rm -r .git/ ".github/" .gitignore README.md index.txt

      - name: create full zip
        run: |
          zip -r ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip .

      - name: capture full zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip
          archive: false

      - name: remove full zip
        run: |
          rm ${{ env.NAME }}-FULL-${{ env.VERSION }}.zip

      - name: create CIT zip
        run: |
          zip -r ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip . -x "assets/appleskin/*" "assets/minecraft/*"

      - name: capture CIT zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: |
            ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip
          archive: false

      - name: remove CIT zip
        run: |
          rm ${{ env.NAME }}-CIT-${{ env.VERSION }}.zip
